    conventions", "analyze repo and save to memory", "gera regras da codebase", or
    "cria regras no ai memory". Do NOT use for one-off code questions, business-logic/architecture
    deep dives (use codenavi), or bug diagnosis (use diagnosing-bugs).
- name:
  - generate-docs-update
  description: 'Use this skill to update existing project documentation based on code
