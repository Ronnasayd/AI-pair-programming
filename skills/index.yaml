- name:
  - figma-mcp
  description: Provides instructions and workflows for using the Figma MCP (Model-Context-Protocol)
    server to interact with Figma and FigJam. Use this skill to generate designs from
    web interfaces, extract design context, manage design systems, and create diagrams.
- name:
  - figma-requirements-screen-mapper
  description: "Map software requirements to Figma screens, producing a table that\
    \ shows which requirements belong to each screen, and which requirements don't\
    \ belong to any screen. Use this skill whenever the user provides a requirements\
    \ document (SRS, PRD, technical spec) AND a Figma file with multiple screens/frames\
    \ and wants to understand which requirements apply to each screen. Triggers on\
    \ phrases like: \"map these requirements to the Figma screens\", \"which requirements\
    \ belong to each screen\", \"create a requirements matrix for these screens\"\
    , \"relate my spec to each Figma frame\", \"which spec items apply to each screen\"\
    , \"trace requirements to screens\", \"requirements traceability matrix\", \"\
    which requirements are covered per screen\", \"organize requirements by screen\"\
    , or when the user provides a requirements doc path AND a Figma file URL and wants\
    \ a mapping/matrix. Also triggers when the user asks \"which requirements don't\
    \ belong to any screen\" or \"what requirements are cross-cutting / non-UI\".\
    \ Always use this skill when BOTH a requirements document AND a multi-screen Figma\
    \ reference are present and the user wants a mapping, matrix, or traceability\
    \ table \u2014 even if they don't use the exact words \"requirements screen mapper\"\
    .\n"
- name:
  - figma-requirements-conformance
  description: 'Verify conformance between a software requirements specification (SRS)
    document and a Figma screen design. Use this skill whenever the user wants to
    audit whether a design screen matches its requirements, check if requirements
    are reflected in a Figma mockup, find gaps between an SRS and a UI design, validate
    design compliance with specification, or identify over/under-specified areas in
    requirements vs design. Triggers on phrases like: "check if the design matches
    the requirements", "audit this Figma screen against the spec", "what''s missing
    in the design", "verify requirements vs Figma", "conformance check", "SRS vs design",
    "does the design cover all requirements", "gap analysis between spec and Figma",
    or when the user provides a document path and a Figma URL and asks whether they
    agree. Always use this skill when BOTH a requirements document path AND a Figma
    reference are present in the request, even if the user doesn''t use the word "conformance"
    or "audit".

    '
- name:
  - figma-code-connect-components
  description: Connects Figma design components to code components using Code Connect.
    Use when user says "code connect", "connect this component to code", "connect
    Figma to code", "map this component", "link component to code", "create code connect
    mapping", "add code connect", "connect design to code", or wants to establish
    mappings between Figma designs and code implementations. Requires Figma MCP server
    connection.
- name:
  - figma-to-code-agentic
  description: "Convert Figma designs into production-ready component code using an\
    \ agentic loop that validates implementation against the design.\n\nUse this skill\
    \ whenever: a Figma link or file is provided and the user wants code generated\
    \ from it; the user says \"generate this Figma design as React/Vue/HTML\", \"\
    convert this Figma to code\", \"build a component from this design\", \"make it\
    \ look exactly like Figma\", or \"match the design\"; the user needs pixel-perfect\
    \ design-to-development handoff; the user mentions needing to validate UI against\
    \ a Figma spec.\n\nThe skill reads design specs via Figma MCP, auto-detects the\
    \ framework, generates code, renders a screenshot via browser automation, compares\
    \ using SSIM (Structural Similarity Index), and iterates up to 10 times until\
    \ reaching \u22650.9 visual similarity. Works for React, Vue 3, and vanilla HTML/CSS.\
    \ Perfect for design system components, landing pages, or any UI that must match\
    \ a Figma spec.\n"
