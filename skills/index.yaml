    Works with React, Vue, HTML, Svelte, and any code containing Tailwind classes.
    Automatically discovers tailwind.config.js/ts

    and validates against both built-in Tailwind defaults and custom extensions defined
    in the config.

    '
- name:
  - typescript-style-guide
  description: 'Conventions and best practices for writing maintainable TypeScript
    code based on the Google TypeScript Style Guide. Use this skill when writing new
    TypeScript modules or services, refactoring TypeScript code to improve readability
    and maintainability, enforcing consistent naming, typing, and formatting conventions,
    designing strongly typed APIs, interfaces, and classes, avoiding unsafe patterns
    such as `any`, prototype modification, or loose equality, structuring large TypeScript
    codebases with predictable patterns, and implementing safe and maintainable code
    in Node.js or browser TypeScript projects. Emphasizes strong typing, clear naming
    conventions, strict equality usage, minimal visibility exposure, avoiding dangerous
    JavaScript features, and consistent formatting. Reference: https://google.github.io/styleguide/tsguide.html'
- name:
  - skill-description-generator
  description: Generate skill description fields that trigger correctly with specific
