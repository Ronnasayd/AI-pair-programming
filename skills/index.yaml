skills:
- name:
  - git-guide
  description: A comprehensive guide to Git commands and workflows, based on the official
    Git cheat sheet. Use this skill to learn and reference common Git operations,
    from basic repository setup to advanced history manipulation.
- name:
  - skill-advisor
  description: 'Analyzes a task or problem and recommends which available skill(s)
    are the best fit — including whether to combine multiple skills together. Use
    this skill whenever the user asks "which skill should I use?", "what skill is
    good for X?", "do I have a skill for Y?", "is there a skill that can help with
    Z?", or any variant of "help me pick a skill". Also trigger this when the user
    describes a task that clearly involves multiple steps or file types and they seem
    unsure how to approach it — even if they don''t use the word "skill". The goal
    is to be the routing layer that maps problems to the right capabilities.

    '
- name:
  - context-map
  description: Generate a map of all files relevant to a task before making changes
- name:
  - deep-research-web
  description: Multi-source deep research using firecrawl and exa MCPs. Searches the
    web, synthesizes findings, and delivers cited reports with source attribution.
    Use when the user wants thorough research on any topic with evidence and citations.
- name:
  - modular-monolith-decomposer
  description: Decomposes a system description into Modular Monolith modules using
    Domain-Driven Design (DDD) principles. Produces a bounded context map, data ownership
    table, external integration boundaries, cross-module communication patterns, a
    ready-to-use directory structure, and an architectural decision log. Use when
    the user says "which modules should I create", "modular monolith decomposition",
    "map bounded contexts", "identify modules from PRD", "structure this codebase",
    "DDD module mapping", "data ownership", "find module boundaries", "how to organize
    my modules", or provides any system description (PRD, requirements, informal explanation)
    and wants to implement it as a Modular Monolith. Do NOT use for Event Storming
    artifact creation (use event-storming skill), microservices decomposition, or
    general architectural Q&A without a concrete system description to analyze.
- name:
  - adversarial-dev
  description: Orchestrates a code task through two separate agents in an adversarial
    loop — an executor that implements and a strict evaluator (no write tools) that
    scores the result 0-10 and demands fixes. Use when the user wants a task "executed
    and evaluated by 2 agents", "adversarial dev", "generator/evaluator loop", higher-reliability
    implementation with independent review, or says "turn this into an adversarial
    workflow". Do NOT use for simple one-shot edits, multi-task wave orchestration
    (use orchestrate), or single-pass code review of existing code (use code-review).
- name:
  - leet-code-patterns
  description: 'Expert guidance on solving LeetCode and coding interview problems
    using the 15 most important algorithmic patterns. Use this skill whenever the
    user asks about: solving a LeetCode problem, coding interview prep, algorithm
    patterns, data structure problems, competitive programming, identifying the right
    approach for a problem, or asks "how do I solve X type of problem". Also trigger
    when user describes a problem and wants to know which technique or pattern to
    apply. Trigger even for vague requests like "help me get better at LeetCode" or
    "I''m stuck on this array problem".

    '
- name:
  - simplified-technical-english
  description: 'Rewrite, review, or check text against ASD-STE100 (Simplified Technical
    English), the aerospace/defense controlled-language specification. Use this skill
    whenever the user asks to write, rewrite, or review text in "Simplified Technical
    English", "STE", "ASD-STE100", or asks to check a document for unapproved words
    / non-STE constructions. Also use when the user pastes technical/maintenance/procedural
    text and asks to simplify it for non-native English readers, or asks about STE
    dictionary approval status of a specific word. Do NOT use for general plain-language
    editing unrelated to the STE spec.

    '
- name:
  - my-tdd-workflow
  description: Use this skill when writing new features, fixing bugs, or refactoring
    code. Enforces test-driven development with 80%+ coverage including unit, integration,
    and E2E tests.
- name:
  - tdd
  description: Use when implementing any feature or bugfix, before writing implementation
    code - write the test first, watch it fail, write minimal code to pass; ensures
    tests actually verify behavior by requiring failure first
- name:
  - test-coverage-review
  description: A skill for performing a deep analysis of test coverage for either
    a task specification (pre-implementation) or a completed task (post-implementation).
    Use this skill to identify missing scenarios, edge cases, and error paths, and
    to ensure that the testing strategy is robust and follows best practices.
- name:
  - opencv
  description: Use this skill whenever the user asks about Python OpenCV, computer
    vision, or image/video processing with cv2. Triggers include reading/writing/displaying
    images, drawing on images, image transformations (resize, rotate, warp, crop),
    thresholding, edge detection, feature detection, color space conversion, smoothing/blurring,
    morphological operations, working with video or webcam feeds, camera calibration,
    and object detection with OpenCV. Apply this skill even if the user just mentions
    cv2, imread, imshow, or asks how to do anything visual/image-related in Python.
    Always use this skill before writing any OpenCV code — it contains critical syntax
    reminders, common parameter patterns, and usage notes.
- name:
  - mermaid-class-diagram
  description: 'Generate, render, and explain Mermaid class diagrams (UML). Use this
    skill whenever the user wants to visualize class structures, object-oriented models,
    entity relationships, system architecture, or data models using Mermaid syntax.
    Triggers include: "class diagram", "UML diagram", "show me the class structure",
    "diagram these classes", "model this system", "visualize my OOP design", "entity
    diagram", "draw relationships between classes", or any request to represent inheritance,
    composition, aggregation, associations, or interfaces visually. Also use when
    a user pastes code (Python, Java, TypeScript, etc.) and asks to diagram it, or
    when they describe a system and want a visual model. Always use this skill proactively
    when class/entity relationships are involved, even if "Mermaid" isn''t mentioned.

    '
- name:
  - apk-reverse
  description: 'Reverse engineering of Android APK files. Use this skill ALWAYS whenever
    the user mentions APK, Android, decompile, reverse engineer, analyze Android app,
    extract code, manifest, permissions, DEX classes, resources, certificates, smali,
    or any kind of Android mobile application analysis. Even if the request is simple
    like "analyze this APK" or "what does this app do", use this skill. Includes static
    analysis, metadata extraction, strings, URLs, permissions, Java/Kotlin classes,
    resources, and suspicious pattern detection.

    '
- name:
  - plan-generator
  description: Generate structured plans for tasks and projects, saved as date-stamped
    markdown files in docs/agents/plans/. Use whenever the user wants to plan a project,
    break down a task, create a roadmap, design a workflow, or organize phases and
    milestones — even if they just say "make a plan for X" or "how should I approach
    Y".
- name:
  - auto-improve
  description: 'After completing any task, extract reusable rules from what worked
    and what failed. Produces output in the exact format used by agent.instructions.md
    (## Mandatory: Rules to Follow / ## Mandatory: Rules to Avoid). Trigger after
    a task finishes when the user asks for a retrospective, lessons learned, or rule
    extraction — or implicitly with phrases like "what did we learn", "what went wrong",
    "what should we avoid next time". Do NOT trigger mid-task or before execution
    completes.

    '
- name:
  - context7-documentation-lookup
  description: Use up-to-date library and framework docs via Context7 MCP instead
    of training data. Activates for setup questions, API references, code examples,
    or when the user names a framework (e.g. React, Next.js, Prisma).
- name:
  - my-frontend-patterns
  description: Frontend development patterns for React, Next.js, state management,
    performance optimization, and UI best practices.
- name:
  - tailwindcss
  description: Tailwind CSS v4 utility-first styling patterns including responsive
    design, dark mode, and custom configuration. Use when styling with Tailwind, adding
    utility classes, configuring Tailwind, setting up dark mode, or customizing the
    theme.
- name:
  - my-python-patterns
  description: Pythonic idioms, PEP 8 standards, type hints, and best practices for
    building robust, efficient, and maintainable Python applications.
- name:
  - my-python-testing
  description: Python testing strategies using pytest, TDD methodology, fixtures,
    mocking, parametrization, and coverage requirements.
- name:
  - python-style-guide
  description: Coding conventions and best practices for Python based on the Google
    Python Style Guide, emphasizing readability, explicitness, consistent naming,
    clear docstrings, safe exception handling, small focused functions, and static
    typing for writing maintainable production-quality Python code.
- name:
  - coverage-gap-audit
  description: Audit Jest test coverage to separate real testing gaps (business logic,
    security paths) from false negatives (wiring, config, generated code) that shouldn't
    count against coverage metrics. Use when the user says "audit test coverage",
    "which files actually need tests", "reduce coverage noise", "why is coverage low",
    "exclude files from coverage", or asks to review/clean up `collectCoverageFrom`.
    Do NOT use for writing the missing tests themselves (that's a separate follow-up
    step this skill hands off explicitly), and do NOT use for non-Jest runners (vitest/pytest/go
    test) — this skill's commands are Jest-specific.
- name:
  - domain-modeling
  description: Build and sharpen a project's domain model. Use when the user wants
    to pin down domain terminology or a ubiquitous language, record an architectural
    decision, or when another skill needs to maintain the domain model.
- name:
  - diagnosing-bugs
  description: Diagnosis loop for hard bugs and performance regressions. Use when
    the user says "diagnose"/"debug this", or reports something broken/throwing/failing/slow.
- name:
  - grill-with-docs
  description: A relentless interview to sharpen a plan or design, which also creates
    docs (ADR's and glossary) as we go.
- name:
  - grilling
  description: Grill the user relentlessly about a plan or design. Use when the user
    wants to stress-test a plan before building, or uses any 'grill' trigger phrases.
- name:
  - document-summarizer
  description: Extract and condense key information from any document or text while
    preserving critical details. Use when you need to summarize PRDs, specifications,
    technical documents, articles, reports, emails, or any text that needs a condensed,
    structured overview. Produces output in sections with bullet points, intelligently
    combining extracted quotes with rewritten insights. Always use this skill whenever
    the user asks to "summarize", "condense", "brief", "extract key points", "make
    a summary", "create an overview", "reduce this", or provides a document/text saying
    "please summarize this" — even if they mention it informally.
- name:
  - code-review
  description: A skill for performing structured code reviews based on git diffs and
    specialist instructions. Use this skill to analyze code changes, identify required
    adjustments, and generate detailed review reports that comply with the system's
    guidelines for surgical changes and security best practices.
- name:
  - codebase-linguistic-analysis-to-csv-export
  description: Identify all non-English text in a codebase (specifically Portuguese
    characters) and export findings to a structured CSV for translation/remediation
    workflows.
- name:
  - orchestrate
  description: Coordinate the execution of complex tasks using multiple specialized
    subagents, ensuring dependencies are respected and parallelization is maximized.
- name:
  - resolve-merge-conflicts
  description: Use this skill immediately when the user mentions merge conflicts that
    need to be resolved. Do not attempt to resolve conflicts directly - invoke this
    skill first. This skill specializes in providing a structured framework for merging
    imports, tests, lock files (regeneration), configuration files, and handling deleted-but-modified
    files with backup and analysis.
- name:
  - copilot-sdk
  description: 'Use this skill whenever the user wants to build Python applications
    or scripts using the GitHub Copilot SDK. Triggers include: building Copilot-powered
    agents or tools in Python, integrating GitHub Copilot CLI programmatically, using
    the copilot Python package, creating sessions with CopilotClient, defining custom
    tools for Copilot, handling streaming from Copilot, setting up custom LLM providers
    (BYOK/Ollama/Azure), permission handling for tool calls, or any workflow involving
    the `copilot` Python package (copilot-sdk). Use this skill even if the user only
    says "Copilot agent", "Copilot session", or "Copilot tool" in a Python context
    — they almost certainly need this.

    '
- name:
  - tlc-execute-tasks-adversarial
  description: 'Orchestrates feature task execution by tag. Main agent filters pending
    tasks from taskmaster, groups them into waves, and directly spawns/drives each
    task''s own executor + evaluator agent pair (applying adversarial-dev''s loop
    logic inline, not via a Skill call) within each wave, in parallel (capped concurrency),
    respecting wave dependencies. Each task''s executor runs tlc-spec-driven with
    the task + spec context it''s given; the evaluator grades against the task''s
    own verification criteria. A task only counts as done at score 8+/10. Updates
    status via MCP after each wave completes. The user decides what to do on failures/exhaustion.
    Use: ''execute feature <tag>'' or run tasks for <tag>. Do not use for direct task
    management (taskmaster skill) or spec creation (tlc-spec-driven).'
- name:
  - integration-testing
  description: 'Expert guidance on Integration Testing in software engineering. Use
    this skill whenever the user asks about integration testing strategies, approaches
    (Big-Bang, Top-Down, Bottom-Up, Mixed/Sandwich), writing integration test cases,
    setting up test environments, identifying integration defects, or comparing integration
    testing with unit/system testing. Trigger this skill for questions like "how do
    I do integration testing", "what''s the difference between top-down and bottom-up
    testing", "how to write integration tests for my modules", "what testing approach
    should I use", or any mention of module interaction testing, stub/driver usage,
    or interface verification. Also trigger when users discuss CI/CD pipelines and
    want to know where integration tests fit in.

    '
- name:
  - tlc-tasks-to-taskmaster
  description: Convert tasks.md spec files into TaskMaster JSON format (.taskmaster/tasks/tasks.json
    for task list, .taskmaster/execution/metadata.json for strategy). Use when user
    says "convert tasks.md to taskmaster json", "transform tasks.md to .taskmaster
    format", "converta tasks.md em tasks.json", or wants to generate TaskMaster JSON
    from a tasks file. Do NOT use for creating task specs, executing tasks, or non-TaskMaster
    conversions.
- name:
  - prd-from-codebase
  description: 'Generates a complete Product Requirements Document (PRD) in Markdown
    from an existing codebase. Use this skill whenever the user wants to document
    software without documentation, understand what a project does, generate a product
    document from code, map application features, identify system agents/roles, or
    mentions terms such as "PRD", "document the project", "generate product documentation",
    "what does this code do", "map features", "understand the codebase", "reverse
    PRD", or similar. The skill uses the available tools (bash, view, etc.) to autonomously
    explore the codebase before generating the document—the user does not need to
    manually paste any code.

    '
- name:
  - event-storming
  description: 'Use this skill whenever the user wants to create, document, or model
    an Event Storming. Triggers include: "do event storming", "model a domain", "map
    domain flow", "create an event diagram", "document bounded contexts", "model commands
    and events", "DDD", "Domain-Driven Design", "convert sticky notes into code",
    "represent flows with Mermaid", "create aggregates", "identify bounded contexts",
    "map domain policies". Also use this skill when the user provides business process
    descriptions and wants to transform them into structured Event Storming artifacts
    — even if they do not explicitly mention the term.

    '
- name:
  - image-mockup-recreator
  description: Recreate a reference screenshot or mockup image as a live HTML/CSS
    artifact, using headless-browser screenshots, an SSIM visual diff score, and pixel-grid
    overlays to iteratively close the gap between the render and the original. Use
    when someone uploads a UI screenshot, app screen, or design mockup and asks to
    "recreate this as an artifact", "build this in HTML", "make a mockup of this image",
    "match this design", or wants automatic adjustment/refinement toward a reference
    image without a Figma file. Do NOT use when a Figma file/node URL is available
    (use a Figma-to-code skill instead) or when the user just wants a design critique
    without building anything (use design-image-diff instead).
- name:
  - webapp-testing
  description: Toolkit for interacting with and testing local web applications using
    Playwright. Supports verifying frontend functionality, debugging UI behavior,
    capturing browser screenshots, and viewing browser logs.
- name:
  - skill-creator
  description: Create new skills, modify and improve existing skills, and measure
    skill performance. Use when users want to create a skill from scratch, edit, or
    optimize an existing skill, run evals to test a skill, benchmark skill performance
    with variance analysis, or optimize a skill's description for better triggering
    accuracy.
- name:
  - pdf
  description: Use this skill whenever the user wants to do anything with PDF files.
    This includes reading or extracting text/tables from PDFs, combining or merging
    multiple PDFs into one, splitting PDFs apart, rotating pages, adding watermarks,
    creating new PDFs, filling PDF forms, encrypting/decrypting PDFs, extracting images,
    and OCR on scanned PDFs to make them searchable. If the user mentions a .pdf file
    or asks to produce one, use this skill.
- name:
  - algorithmic-art
  description: Creating algorithmic art using p5.js with seeded randomness and interactive
    parameter exploration. Use this when users request creating art using code, generative
    art, algorithmic art, flow fields, or particle systems. Create original algorithmic
    art rather than copying existing artists' work to avoid copyright violations.
- name:
  - frontend-design
  description: Guidance for distinctive, intentional visual design when building new
    UI or reshaping an existing one. Helps with aesthetic direction, typography, and
    making choices that don't read as templated defaults.
- name:
  - docx
  description: 'Use this skill whenever the user wants to create, read, edit, or manipulate
    Word documents (.docx files). Triggers include: any mention of ''Word doc'', ''word
    document'', ''.docx'', or requests to produce professional documents with formatting
    like tables of contents, headings, page numbers, or letterheads. Also use when
    extracting or reorganizing content from .docx files, inserting or replacing images
    in documents, performing find-and-replace in Word files, working with tracked
    changes or comments, or converting content into a polished Word document. If the
    user asks for a ''report'', ''memo'', ''letter'', ''template'', or similar deliverable
    as a Word or .docx file, use this skill. Do NOT use for PDFs, spreadsheets, Google
    Docs, or general coding tasks unrelated to document generation.'
- name:
  - xlsx
  description: 'Use this skill any time a spreadsheet file is the primary input or
    output. This means any task where the user wants to: open, read, edit, or fix
    an existing .xlsx, .xlsm, .csv, or .tsv file (e.g., adding columns, computing
    formulas, formatting, charting, cleaning messy data); create a new spreadsheet
    from scratch or from other data sources; or convert between tabular file formats.
    Trigger especially when the user references a spreadsheet file by name or path
    — even casually (like "the xlsx in my downloads") — and wants something done to
    it or produced from it. Also trigger for cleaning or restructuring messy tabular
    data files (malformed rows, misplaced headers, junk data) into proper spreadsheets.
    The deliverable must be a spreadsheet file. Do NOT trigger when the primary deliverable
    is a Word document, HTML report, standalone Python script, database pipeline,
    or Google Sheets API integration, even if tabular data is involved.'
- name:
  - mcp-builder
  description: Guide for creating high-quality MCP (Model Context Protocol) servers
    that enable LLMs to interact with external services through well-designed tools.
    Use when building MCP servers to integrate external APIs or services, whether
    in Python (FastMCP) or Node/TypeScript (MCP SDK).
- name:
  - dynamic-programming-analysis
  description: 'Use this skill whenever the user presents a problem, challenge, decision,
    or complex question that needs to be broken down into smaller, manageable sub-problems,
    just like dynamic programming in computer science. Triggers include: any problem
    that feels too big or overwhelming, strategic planning questions, optimization
    challenges (what is the best way to...), multi-step processes, decision trees,
    architectural designs, research questions, business or personal dilemmas, or any
    situation where the user says they do not know where to start. Always use this
    skill when decomposition, step-by-step reasoning, or structured problem-solving
    would help, even if the user does not mention dynamic programming explicitly.
    The goal is to model the DP mindset: identify base cases, define sub-problems,
    find overlapping structure, and build toward the solution bottom-up.

    '
- name:
  - skills-discovery
  description: 'Explore all available skills (enabled and disabled) by task or theme
    to discover which skills exist for a problem. Use when asking "which skills can
    help with X?", "what skills do I have for topic Y?", "explore skills related to
    Z", "show me all skills for [domain]", or when wanting to discover relevant skills
    before deciding to enable them. Different from skill-advisor: exploratory discovery
    across ALL skills with reasons why each matches.'
- name:
  - extract-automation-candidates
  description: Mines a project's Claude Code session transcripts, git commit history,
    and formal spec/PRD markdown files for recurring or high-cost manual workflows
    that are worth turning into a reusable skill, slash command, or standing instruction
    — then writes the actual artifact (SKILL.md, command markdown, or an AGENTS.md/CLAUDE.md
    instruction line) instead of just describing it. Use when the user asks to "find
    things worth automating", "extract skills from our sessions", "what should be
    a command by now", "turn recurring patterns into skills", or wants a cross-source
    audit of automation opportunities with traceability back to the conversations/commits/specs
    that justified each one. Do NOT use for requirements extraction (use extract-software-requirements
    instead), for scaffolding a skill the user has already fully specified (use skill-architect
    instead), or for a one-off single-file edit with no recurring pattern behind it.
- name:
  - safe-refactor
  description: 'Guide safe refactoring of complex, untested code using a multi-phase
    hybrid approach: characterization tests → agent-assisted refactoring → manual
    review → integration testing → staged rollout. Use this skill whenever the user
    mentions refactoring, code cleanup, or code modernization — especially when there
    are no existing tests, when delegating to an agent, or when regressions would
    be costly. Also trigger for: "improve code quality without breaking things", "migrate
    to a new pattern safely", "modernize legacy code", "rewrite this module", "clean
    up this file", "my code has no tests but I need to refactor it", or any scenario
    involving high-risk code changes where behavior preservation matters. When in
    doubt, use this skill — a structured approach is almost always better than ad-hoc
    refactoring.

    '
- name:
  - execute-task
  description: 'Execute a specified task by reading detailed specifications, analyzing
    requirements, planning the approach, and implementing step-by-step. Use this skill
    when: you have a task specification file or task ID that needs completion; the
    task is multi-step, involves architecture decisions, or requires tool orchestration;
    you need to track progress across subtasks and delegate work to specialist agents.
    Triggers on task execution requests, implementation assignments, feature builds,
    bug fixes, refactoring projects, or when a user provides a task spec .md file.
    Always use this skill for complex development work rather than tackling it directly
    —delegate to specialists and maintain progress visibility with task tracking.'
- name:
  - golang-style-guide
  description: 'Conventions and best practices for writing readable, maintainable
    Go code based on the Google Go Style Guide. Use this skill when: Writing new Go
    packages, services, or command-line tools. Refactoring Go code to improve clarity
    and maintainability. Enforcing idiomatic Go naming, formatting, and structure.
    Designing APIs and libraries for long-term maintainability. Avoiding unnecessary
    abstraction or complexity in Go programs.'
- name:
  - my-golang-testing
  description: Go testing patterns including table-driven tests, subtests, benchmarks,
    fuzzing, and test coverage. Follows TDD methodology with idiomatic Go practices.
- name:
  - my-golang-patterns
  description: Idiomatic Go patterns, best practices, and conventions for building
    robust, efficient, and maintainable Go applications.
- name:
  - react-composition-patterns
  description: React composition patterns that scale. Use when refactoring components
    with boolean prop proliferation, building flexible component libraries, or designing
    reusable APIs. Triggers on tasks involving compound components, render props,
    context providers, or component architecture. Includes React 19 API changes. Do
    NOT use for React/Next.js performance optimization (use react-best-practices instead).
- name:
  - codenavi
  description: Your pathfinder for navigating unknown codebases. Investigates with
    precision, implements surgically, and never assumes — if it doesn't know, it says
    so. Maintains a .notebook/ knowledge base that grows across sessions, turning
    every discovery into lasting intelligence. Summons available skills, MCPs, and
    docs when the mission demands. Use when fixing bugs, implementing features, refactoring,
    investigating flows, or any development task in unfamiliar territory. Triggers
    on "fix this", "implement this", "how does this work", "investigate this flow",
    "help me with this code". Do NOT use for greenfield scaffolding, CI/CD, or infrastructure
    provisioning.
- name:
  - frontend-blueprint
  description: AI frontend specialist and design consultant that guides users through
    a structured discovery process before generating any code. Collects visual references,
    design tokens, typography, icons, layout preferences, and brand guidelines to
    ensure the final output matches the user's vision with high fidelity. Use when
    the user asks to build, design, create, or improve any frontend interface — websites,
    landing pages, dashboards, components, apps, emails, forms, modals, or any UI
    element. Also triggers on "build me a UI", "design a page", "create a component",
    "improve this layout", "make this look better", "frontend", "interface", "redesign",
    or when the user provides mockups, screenshots, or design references. Do NOT use
    for backend logic, API design, database schemas, or non-visual code tasks.
- name:
  - tlc-spec-driven
  description: Feature planning and implementation with 4 adaptive phases — Specify,
    Design, Tasks, Execute. Auto-sizes depth by complexity. Creates atomic tasks with
    verification criteria, atomic git commits, and requirement traceability. Features
    an independent Verifier (author != verifier, evidence-or-zero), persistent decision
    log (STATE.md), and test-coverage-matrix-driven tests, plus a self-improving lessons
    layer that turns verification failures into reusable project-local guidance. Stack-agnostic.
    Use when (1) Planning features (requirements, design, task breakdown), (2) Implementing
    with verification and atomic commits, (3) Validating or verifying an implementation
    against a spec. Triggers on "specify feature", "discuss feature", "design", "tasks",
    "implement", "validate", "verify work", "UAT", "record decision", "pause work",
    "resume work". Do NOT use for architecture decomposition analysis (use architecture
    skills) or technical design docs (use create-technical-design-doc).
- name:
  - figma-implement-design
  description: Translate Figma nodes into production-ready code with 1:1 visual fidelity
    using the Figma MCP workflow (design context, screenshots, assets, and project-convention
    translation). Use when the user provides Figma URLs or node IDs and asks to implement
    designs or components that must match Figma specs. Requires a working Figma MCP
    server connection. Do NOT use for general Figma data fetching, variable exploration,
    or MCP troubleshooting (use figma instead).
- name:
  - create-rfc
  description: Creates structured Request for Comments (RFC) documents for proposing
    and deciding on significant changes. Use when the user says "write an RFC", "create
    a proposal", "I need to propose a change", "draft an RFC", "document a decision",
    or needs stakeholder alignment before making a major technical or process decision.
    Do NOT use for TDDs/implementation docs (use technical-design-doc-creator instead),
    README files, or general documentation.
- name:
  - subagent-creator
  description: Guide for creating AI subagents with isolated context for complex multi-step
    workflows. Use when users want to create a subagent, specialized agent, verifier,
    debugger, or orchestrator that requires isolated context and deep specialization.
    Works with any agent that supports subagent delegation. Triggers on "create subagent",
    "new agent", "specialized assistant", "create verifier". Do NOT use for Cursor-specific
    subagents (use cursor-subagent-creator instead).
- name:
  - domain-analysis
  description: Maps business domains and suggests service boundaries in any codebase
    using DDD Strategic Design. Use when asking "what are the domains in this codebase?",
    "where should I draw service boundaries?", "identify bounded contexts", "classify
    subdomains", "DDD analysis", or analyzing domain cohesion. Do NOT use for grouping
    existing components into domains (use domain-identification-grouping) or dependency
    analysis (use coupling-analysis).
- name:
  - gh-address-comments
  description: Address review and issue comments on the open GitHub PR for the current
    branch using gh CLI. Use when user says "address PR comments", "fix review feedback",
    "respond to PR review", or "handle PR comments". Verifies gh auth first and prompts
    to authenticate if not logged in. Do NOT use for creating PRs, CI debugging (use
    gh-fix-ci), or general Git operations.
- name:
  - perf-web-optimization
  description: 'Optimize web performance: bundle size, images, caching, lazy loading,
    and overall page speed. Use when site is slow, reducing bundle size, fixing layout
    shifts, improving Time to Interactive, or optimizing for Lighthouse scores. Triggers
    on: web performance, bundle size, page speed, slow site, lazy loading. Do NOT
    use for Core Web Vitals-specific fixes (use core-web-vitals), running Lighthouse
    audits (use perf-lighthouse), or Astro-specific optimization (use perf-astro).'
- name:
  - mermaid-studio
  description: Expert Mermaid diagram creation, validation, and rendering with dual-engine
    output (SVG/PNG/ASCII). Supports all 20+ diagram types including C4 architecture,
    AWS architecture-beta with service icons, flowcharts, sequence, ERD, state, class,
    mindmap, timeline, git graph, sankey, and more. Features code-to-diagram analysis,
    batch rendering, 15+ themes, and syntax validation. Use when users ask to create
    diagrams, visualize architecture, render mermaid files, generate ASCII diagrams,
    document system flows, model databases, draw AWS infrastructure, analyze code
    structure, or anything involving "mermaid", "diagram", "flowchart", "architecture
    diagram", "sequence diagram", "ERD", "C4", "ASCII diagram". Do NOT use for non-Mermaid
    image generation, data plotting with chart libraries, or general documentation
    writing.
- name:
  - modular-decomposition
  description: Runs a sequenced monolith-to-modular pipeline that sizes and inventories
    components, finds shared domain duplication, addresses flattening and hierarchy
    issues, analyzes coupling, then groups components into candidate domain-aligned
    units, with optional embedded DDD strategic analysis for bounded contexts. Use
    when asking how to split a monolith, size components before extraction, find duplicated
    domain logic, clean up module hierarchy, measure coupling between modules, or
    group components into services. Do NOT use for phased extraction roadmaps or prioritization
    without the prior analysis steps (use decomposition-planning-roadmap after this
    pipeline), end-to-end legacy migration strategy writeups (use legacy-migration-planner),
    pure infrastructure capacity sizing, or when you only need DDD without the structural
    pipeline (install domain-analysis standalone).
- name:
  - the-fool
  description: Use when challenging ideas, plans, decisions, or proposals. Invoke
    to play devil's advocate, run a pre-mortem, red team, stress test assumptions,
    audit evidence quality, or find blind spots before committing. Do NOT use for
    building plans, making decisions, or generating solutions — this skill only challenges
    and critiques.
- name:
  - jira-assistant
  description: Manage Jira issues via Atlassian MCP — search, create, update, transition
    status, and handle sprint tasks. Auto-detects workspace configuration. Use when
    user says "create a Jira ticket", "update my sprint", "check Jira status", "transition
    this issue", "search Jira", or "move ticket to done". Do NOT use for Confluence
    pages (use confluence-assistant).
- name:
  - coupling-analysis
  description: Analyzes coupling between modules using the three-dimensional model
    (strength, distance, volatility) from "Balancing Coupling in Software Design".
    Use when asking "are these modules too coupled?", "show me dependencies", "analyze
    integration quality", "which modules should I decouple?", "coupling report", or
    evaluating architectural health. Do NOT use for domain boundary analysis (use
    domain-analysis) or component sizing (use component-identification-sizing).
- name:
  - security-best-practices
  description: Perform language and framework specific security best-practice reviews
    and suggest improvements. Use when the user explicitly requests security best
    practices guidance, a security review or report, or secure-by-default coding help.
    Supports Python, JavaScript/TypeScript, and Go. Do NOT use for general code review,
    debugging, threat modeling (use security-threat-model), or non-security tasks.
- name:
  - gh-fix-ci
  description: Use when a user asks to debug or fix failing GitHub PR checks that
    run in GitHub Actions. Uses `gh` to inspect checks and logs, summarize failure
    context, draft a fix plan, and implement only after explicit approval. Treats
    external providers (for example Buildkite) as out of scope and reports only the
    details URL. Do NOT use for addressing PR review comments (use gh-address-comments)
    or general CI outside GitHub Actions.
- name:
  - seo
  description: Optimize for search engine visibility and ranking. Use when asked to
    "improve SEO", "optimize for search", "fix meta tags", "add structured data",
    "sitemap optimization", or "search engine optimization". Do NOT use for accessibility
    (use web-accessibility), performance (use core-web-vitals), or comprehensive site
    audits covering multiple areas (use web-quality-audit).
- name:
  - legacy-migration-planner
  description: Use when planning legacy system migrations, codebase modernization,
    monolith decomposition, microservices consolidation, cross-language rewrites,
    or framework upgrades. Invoke for strangler fig pattern, incremental migration
    strategy, or refactoring roadmaps. Do NOT use for domain analysis (use domain-analysis),
    component sizing (use component-identification-sizing), or step-by-step decomposition
    plans (use decomposition-planning-roadmap).
- name:
  - gtm-engineering
  description: When the user wants to build GTM automation with code, design workflow
