skills:
- name:
  - git-guide
  description: A comprehensive guide to Git commands and workflows, based on the official
    Git cheat sheet. Use this skill to learn and reference common Git operations,
    from basic repository setup to advanced history manipulation.
- name:
  - skill-advisor
  description: "Analyzes a task or problem and recommends which available skill(s)\
    \ are the best fit \u2014 including whether to combine multiple skills together.\
    \ Use this skill whenever the user asks \"which skill should I use?\", \"what\
    \ skill is good for X?\", \"do I have a skill for Y?\", \"is there a skill that\
    \ can help with Z?\", or any variant of \"help me pick a skill\". Also trigger\
    \ this when the user describes a task that clearly involves multiple steps or\
    \ file types and they seem unsure how to approach it \u2014 even if they don't\
    \ use the word \"skill\". The goal is to be the routing layer that maps problems\
    \ to the right capabilities.\n"
- name:
  - context-map
  description: Generate a map of all files relevant to a task before making changes
- name:
  - deep-research-web
  description: Multi-source deep research using firecrawl and exa MCPs. Searches the
    web, synthesizes findings, and delivers cited reports with source attribution.
    Use when the user wants thorough research on any topic with evidence and citations.
- name:
  - leet-code-patterns
  description: 'Expert guidance on solving LeetCode and coding interview problems
    using the 15 most important algorithmic patterns. Use this skill whenever the
    user asks about: solving a LeetCode problem, coding interview prep, algorithm
    patterns, data structure problems, competitive programming, identifying the right
    approach for a problem, or asks "how do I solve X type of problem". Also trigger
    when user describes a problem and wants to know which technique or pattern to
    apply. Trigger even for vague requests like "help me get better at LeetCode" or
    "I''m stuck on this array problem".

    '
- name:
  - tdd-workflow
  description: Use this skill when writing new features, fixing bugs, or refactoring
    code. Enforces test-driven development with 80%+ coverage including unit, integration,
    and E2E tests.
- name:
  - tdd
  description: Use when implementing any feature or bugfix, before writing implementation
    code - write the test first, watch it fail, write minimal code to pass; ensures
    tests actually verify behavior by requiring failure first
- name:
  - test-coverage-review
  description: A skill for performing a deep analysis of test coverage for either
    a task specification (pre-implementation) or a completed task (post-implementation).
    Use this skill to identify missing scenarios, edge cases, and error paths, and
    to ensure that the testing strategy is robust and follows best practices.
- name:
  - opencv
  description: "Use this skill whenever the user asks about Python OpenCV, computer\
    \ vision, or image/video processing with cv2. Triggers include reading/writing/displaying\
    \ images, drawing on images, image transformations (resize, rotate, warp, crop),\
    \ thresholding, edge detection, feature detection, color space conversion, smoothing/blurring,\
    \ morphological operations, working with video or webcam feeds, camera calibration,\
    \ and object detection with OpenCV. Apply this skill even if the user just mentions\
    \ cv2, imread, imshow, or asks how to do anything visual/image-related in Python.\
    \ Always use this skill before writing any OpenCV code \u2014 it contains critical\
    \ syntax reminders, common parameter patterns, and usage notes."
- name:
  - mermaid-class-diagram
  description: 'Generate, render, and explain Mermaid class diagrams (UML). Use this
    skill whenever the user wants to visualize class structures, object-oriented models,
    entity relationships, system architecture, or data models using Mermaid syntax.
    Triggers include: "class diagram", "UML diagram", "show me the class structure",
    "diagram these classes", "model this system", "visualize my OOP design", "entity
    diagram", "draw relationships between classes", or any request to represent inheritance,
    composition, aggregation, associations, or interfaces visually. Also use when
    a user pastes code (Python, Java, TypeScript, etc.) and asks to diagram it, or
    when they describe a system and want a visual model. Always use this skill proactively
    when class/entity relationships are involved, even if "Mermaid" isn''t mentioned.

    '
- name:
  - apk-reverse
  description: 'Reverse engineering of Android APK files. Use this skill ALWAYS whenever
    the user mentions APK, Android, decompile, reverse engineer, analyze Android app,
    extract code, manifest, permissions, DEX classes, resources, certificates, smali,
    or any kind of Android mobile application analysis. Even if the request is simple
    like "analyze this APK" or "what does this app do", use this skill. Includes static
    analysis, metadata extraction, strings, URLs, permissions, Java/Kotlin classes,
    resources, and suspicious pattern detection.

    '
- name:
  - technical-decision-maker
  description: Helps make informed technical decisions by presenting viable options
    with pros/cons analysis, context searches, and decomposition of complex problems
    into smaller sub-problems.
- name:
  - plan-generator
  description: "Generate structured plans for tasks and projects, saved as date-stamped\
    \ markdown files in docs/agents/plans/. Use whenever the user wants to plan a\
    \ project, break down a task, create a roadmap, design a workflow, or organize\
    \ phases and milestones \u2014 even if they just say \"make a plan for X\" or\
    \ \"how should I approach Y\"."
- name:
  - auto-improve
  description: "After completing any task, extract reusable rules from what worked\
    \ and what failed. Produces output in the exact format used by agent.instructions.md\
    \ (## Mandatory: Rules to Follow / ## Mandatory: Rules to Avoid). Trigger after\
    \ a task finishes when the user asks for a retrospective, lessons learned, or\
    \ rule extraction \u2014 or implicitly with phrases like \"what did we learn\"\
    , \"what went wrong\", \"what should we avoid next time\". Do NOT trigger mid-task\
    \ or before execution completes.\n"
- name:
  - context7-documentation-lookup
  description: Use up-to-date library and framework docs via Context7 MCP instead
    of training data. Activates for setup questions, API references, code examples,
    or when the user names a framework (e.g. React, Next.js, Prisma).
- name:
  - tailwindcss
  description: Tailwind CSS v4 utility-first styling patterns including responsive
    design, dark mode, and custom configuration. Use when styling with Tailwind, adding
    utility classes, configuring Tailwind, setting up dark mode, or customizing the
    theme.
- name:
  - python-patterns
  description: Pythonic idioms, PEP 8 standards, type hints, and best practices for
    building robust, efficient, and maintainable Python applications.
- name:
  - python-testing
  description: Python testing strategies using pytest, TDD methodology, fixtures,
    mocking, parametrization, and coverage requirements.
- name:
  - python-style-guide
  description: Coding conventions and best practices for Python based on the Google
    Python Style Guide, emphasizing readability, explicitness, consistent naming,
    clear docstrings, safe exception handling, small focused functions, and static
    typing for writing maintainable production-quality Python code.
- name:
  - document-summarizer
  description: "Extract and condense key information from any document or text while\
    \ preserving critical details. Use when you need to summarize PRDs, specifications,\
    \ technical documents, articles, reports, emails, or any text that needs a condensed,\
    \ structured overview. Produces output in sections with bullet points, intelligently\
    \ combining extracted quotes with rewritten insights. Always use this skill whenever\
    \ the user asks to \"summarize\", \"condense\", \"brief\", \"extract key points\"\
    , \"make a summary\", \"create an overview\", \"reduce this\", or provides a document/text\
    \ saying \"please summarize this\" \u2014 even if they mention it informally."
- name:
  - code-review
  description: A skill for performing structured code reviews based on git diffs and
    specialist instructions. Use this skill to analyze code changes, identify required
    adjustments, and generate detailed review reports that comply with the system's
    guidelines for surgical changes and security best practices.
- name:
  - resolve-merge-conflicts
  description: Use this skill immediately when the user mentions merge conflicts that
    need to be resolved. Do not attempt to resolve conflicts directly - invoke this
    skill first. This skill specializes in providing a structured framework for merging
    imports, tests, lock files (regeneration), configuration files, and handling deleted-but-modified
    files with backup and analysis.
- name:
  - copilot-sdk
  description: "Use this skill whenever the user wants to build Python applications\
    \ or scripts using the GitHub Copilot SDK. Triggers include: building Copilot-powered\
    \ agents or tools in Python, integrating GitHub Copilot CLI programmatically,\
    \ using the copilot Python package, creating sessions with CopilotClient, defining\
    \ custom tools for Copilot, handling streaming from Copilot, setting up custom\
    \ LLM providers (BYOK/Ollama/Azure), permission handling for tool calls, or any\
    \ workflow involving the `copilot` Python package (copilot-sdk). Use this skill\
    \ even if the user only says \"Copilot agent\", \"Copilot session\", or \"Copilot\
    \ tool\" in a Python context \u2014 they almost certainly need this.\n"
- name:
  - integration-testing
  description: 'Expert guidance on Integration Testing in software engineering. Use
    this skill whenever the user asks about integration testing strategies, approaches
    (Big-Bang, Top-Down, Bottom-Up, Mixed/Sandwich), writing integration test cases,
    setting up test environments, identifying integration defects, or comparing integration
    testing with unit/system testing. Trigger this skill for questions like "how do
    I do integration testing", "what''s the difference between top-down and bottom-up
    testing", "how to write integration tests for my modules", "what testing approach
    should I use", or any mention of module interaction testing, stub/driver usage,
    or interface verification. Also trigger when users discuss CI/CD pipelines and
    want to know where integration tests fit in.

    '
- name:
  - prd-from-codebase
  description: "Gera um PRD (Product Requirements Document) completo em Markdown a\
    \ partir de uma base de c\xF3digo existente. Use esta skill sempre que o usu\xE1\
    rio quiser documentar um software sem documenta\xE7\xE3o, entender o que um projeto\
    \ faz, gerar um documento de produto a partir de c\xF3digo, mapear funcionalidades\
    \ de uma aplica\xE7\xE3o, identificar agentes/pap\xE9is de um sistema, ou quando\
    \ mencionar termos como \"PRD\", \"documentar o projeto\", \"gerar documenta\xE7\
    \xE3o do produto\", \"o que esse c\xF3digo faz\", \"mapear funcionalidades\",\
    \ \"entender a base de c\xF3digo\", \"reverse PRD\" ou similares. A skill usa\
    \ as ferramentas dispon\xEDveis (bash, view, etc.) para explorar autonomamente\
    \ a base de c\xF3digo antes de gerar o documento \u2014 o usu\xE1rio n\xE3o precisa\
    \ colar c\xF3digo manualmente.\n"
- name:
  - event-storming
  description: "Use this skill whenever the user wants to create, document, or model\
    \ an Event Storming. Triggers include: \"do event storming\", \"model a domain\"\
    , \"map domain flow\", \"create an event diagram\", \"document bounded contexts\"\
    , \"model commands and events\", \"DDD\", \"Domain-Driven Design\", \"convert\
    \ sticky notes into code\", \"represent flows with Mermaid\", \"create aggregates\"\
    , \"identify bounded contexts\", \"map domain policies\". Also use this skill\
    \ when the user provides business process descriptions and wants to transform\
    \ them into structured Event Storming artifacts \u2014 even if they do not explicitly\
    \ mention the term.\n"
- name:
  - skill-creator
  description: Create new skills, modify and improve existing skills, and measure
    skill performance. Use when users want to create a skill from scratch, edit, or
    optimize an existing skill, run evals to test a skill, benchmark skill performance
    with variance analysis, or optimize a skill's description for better triggering
    accuracy.
- name:
  - frontend-design
  description: Create distinctive, production-grade frontend interfaces with high
    design quality. Use this skill when the user asks to build web components, pages,
    artifacts, posters, or applications (examples include websites, landing pages,
    dashboards, React components, HTML/CSS layouts, or when styling/beautifying any
    web UI). Generates creative, polished code and UI design that avoids generic AI
    aesthetics.
- name:
  - mcp-builder
  description: Guide for creating high-quality MCP (Model Context Protocol) servers
    that enable LLMs to interact with external services through well-designed tools.
    Use when building MCP servers to integrate external APIs or services, whether
    in Python (FastMCP) or Node/TypeScript (MCP SDK).
- name:
  - dynamic-programming-analysis
  description: 'Use this skill whenever the user presents a problem, challenge, decision,
    or complex question that needs to be broken down into smaller, manageable sub-problems,
    just like dynamic programming in computer science. Triggers include: any problem
    that feels too big or overwhelming, strategic planning questions, optimization
    challenges (what is the best way to...), multi-step processes, decision trees,
    architectural designs, research questions, business or personal dilemmas, or any
    situation where the user says they do not know where to start. Always use this
    skill when decomposition, step-by-step reasoning, or structured problem-solving
    would help, even if the user does not mention dynamic programming explicitly.
    The goal is to model the DP mindset: identify base cases, define sub-problems,
    find overlapping structure, and build toward the solution bottom-up.

    '
- name:
  - safe-refactor
  description: "Guide safe refactoring of complex, untested code using a multi-phase\
    \ hybrid approach: characterization tests \u2192 agent-assisted refactoring \u2192\
    \ manual review \u2192 integration testing \u2192 staged rollout. Use this skill\
    \ whenever the user mentions refactoring, code cleanup, or code modernization\
    \ \u2014 especially when there are no existing tests, when delegating to an agent,\
    \ or when regressions would be costly. Also trigger for: \"improve code quality\
    \ without breaking things\", \"migrate to a new pattern safely\", \"modernize\
    \ legacy code\", \"rewrite this module\", \"clean up this file\", \"my code has\
    \ no tests but I need to refactor it\", or any scenario involving high-risk code\
    \ changes where behavior preservation matters. When in doubt, use this skill \u2014\
    \ a structured approach is almost always better than ad-hoc refactoring.\n"
- name:
  - execute-task
  description: "Execute a specified task by reading detailed specifications, analyzing\
    \ requirements, planning the approach, and implementing step-by-step. Use this\
    \ skill when: you have a task specification file or task ID that needs completion;\
    \ the task is multi-step, involves architecture decisions, or requires tool orchestration;\
    \ you need to track progress across subtasks and delegate work to specialist agents.\
    \ Triggers on task execution requests, implementation assignments, feature builds,\
    \ bug fixes, refactoring projects, or when a user provides a task spec .md file.\
    \ Always use this skill for complex development work rather than tackling it directly\
    \ \u2014delegate to specialists and maintain progress visibility with task tracking."
- name:
  - golang-style-guide
  description: 'Conventions and best practices for writing readable, maintainable
    Go code based on the Google Go Style Guide. Use this skill when: Writing new Go
    packages, services, or command-line tools. Refactoring Go code to improve clarity
    and maintainability. Enforcing idiomatic Go naming, formatting, and structure.
    Designing APIs and libraries for long-term maintainability. Avoiding unnecessary
    abstraction or complexity in Go programs.'
- name:
  - golang-testing
  description: Go testing patterns including table-driven tests, subtests, benchmarks,
    fuzzing, and test coverage. Follows TDD methodology with idiomatic Go practices.
- name:
  - golang-patterns
  description: Idiomatic Go patterns, best practices, and conventions for building
    robust, efficient, and maintainable Go applications.
- name:
  - react-composition-patterns
  description: React composition patterns that scale. Use when refactoring components
    with boolean prop proliferation, building flexible component libraries, or designing
    reusable APIs. Triggers on tasks involving compound components, render props,
    context providers, or component architecture. Includes React 19 API changes. Do
    NOT use for React/Next.js performance optimization (use react-best-practices instead).
- name:
  - codenavi
  description: "Your pathfinder for navigating unknown codebases. Investigates with\
    \ precision, implements surgically, and never assumes \u2014 if it doesn't know,\
    \ it says so. Maintains a .notebook/ knowledge base that grows across sessions,\
    \ turning every discovery into lasting intelligence. Summons available skills,\
    \ MCPs, and docs when the mission demands. Use when fixing bugs, implementing\
    \ features, refactoring, investigating flows, or any development task in unfamiliar\
    \ territory. Triggers on \"fix this\", \"implement this\", \"how does this work\"\
    , \"investigate this flow\", \"help me with this code\". Do NOT use for greenfield\
    \ scaffolding, CI/CD, or infrastructure provisioning."
- name:
  - frontend-blueprint
  description: "AI frontend specialist and design consultant that guides users through\
    \ a structured discovery process before generating any code. Collects visual references,\
    \ design tokens, typography, icons, layout preferences, and brand guidelines to\
    \ ensure the final output matches the user's vision with high fidelity. Use when\
    \ the user asks to build, design, create, or improve any frontend interface \u2014\
    \ websites, landing pages, dashboards, components, apps, emails, forms, modals,\
    \ or any UI element. Also triggers on \"build me a UI\", \"design a page\", \"\
    create a component\", \"improve this layout\", \"make this look better\", \"frontend\"\
    , \"interface\", \"redesign\", or when the user provides mockups, screenshots,\
    \ or design references. Do NOT use for backend logic, API design, database schemas,\
    \ or non-visual code tasks."
- name:
  - tlc-spec-driven
  description: Project and feature planning with 4 adaptive phases - Specify, Design,
    Tasks, Execute. Auto-sizes depth by complexity. Creates atomic tasks with verification
    criteria, atomic git commits, requirement traceability, and persistent memory
    across sessions. Stack-agnostic. Use when (1) Starting new projects (initialize
    vision, goals, roadmap), (2) Working with existing codebases (map stack, architecture,
    conventions), (3) Planning features (requirements, design, task breakdown), (4)
    Implementing with verification and atomic commits, (5) Quick ad-hoc tasks (bug
    fixes, config changes), (6) Tracking decisions/blockers/deferred ideas across
    sessions, (7) Pausing/resuming work. Triggers on "initialize project", "map codebase",
    "specify feature", "discuss feature", "design", "tasks", "implement", "validate",
    "verify work", "UAT", "quick fix", "quick task", "pause work", "resume work".
    Do NOT use for architecture decomposition analysis (use architecture skills) or
    technical design docs (use create-technical-design-doc).
- name:
  - figma-implement-design
  description: Translate Figma nodes into production-ready code with 1:1 visual fidelity
    using the Figma MCP workflow (design context, screenshots, assets, and project-convention
    translation). Use when the user provides Figma URLs or node IDs and asks to implement
    designs or components that must match Figma specs. Requires a working Figma MCP
    server connection. Do NOT use for general Figma data fetching, variable exploration,
    or MCP troubleshooting (use figma instead).
- name:
  - create-rfc
  description: Creates structured Request for Comments (RFC) documents for proposing
    and deciding on significant changes. Use when the user says "write an RFC", "create
    a proposal", "I need to propose a change", "draft an RFC", "document a decision",
    or needs stakeholder alignment before making a major technical or process decision.
    Do NOT use for TDDs/implementation docs (use technical-design-doc-creator instead),
    README files, or general documentation.
- name:
  - subagent-creator
  description: Guide for creating AI subagents with isolated context for complex multi-step
    workflows. Use when users want to create a subagent, specialized agent, verifier,
    debugger, or orchestrator that requires isolated context and deep specialization.
    Works with any agent that supports subagent delegation. Triggers on "create subagent",
    "new agent", "specialized assistant", "create verifier". Do NOT use for Cursor-specific
    subagents (use cursor-subagent-creator instead).
- name:
  - domain-analysis
  description: Maps business domains and suggests service boundaries in any codebase
    using DDD Strategic Design. Use when asking "what are the domains in this codebase?",
    "where should I draw service boundaries?", "identify bounded contexts", "classify
    subdomains", "DDD analysis", or analyzing domain cohesion. Do NOT use for grouping
    existing components into domains (use domain-identification-grouping) or dependency
    analysis (use coupling-analysis).
- name:
  - gh-address-comments
  description: Address review and issue comments on the open GitHub PR for the current
    branch using gh CLI. Use when user says "address PR comments", "fix review feedback",
    "respond to PR review", or "handle PR comments". Verifies gh auth first and prompts
    to authenticate if not logged in. Do NOT use for creating PRs, CI debugging (use
    gh-fix-ci), or general Git operations.
- name:
  - perf-web-optimization
  description: 'Optimize web performance: bundle size, images, caching, lazy loading,
    and overall page speed. Use when site is slow, reducing bundle size, fixing layout
    shifts, improving Time to Interactive, or optimizing for Lighthouse scores. Triggers
    on: web performance, bundle size, page speed, slow site, lazy loading. Do NOT
    use for Core Web Vitals-specific fixes (use core-web-vitals), running Lighthouse
    audits (use perf-lighthouse), or Astro-specific optimization (use perf-astro).'
- name:
  - mermaid-studio
  description: Expert Mermaid diagram creation, validation, and rendering with dual-engine
    output (SVG/PNG/ASCII). Supports all 20+ diagram types including C4 architecture,
    AWS architecture-beta with service icons, flowcharts, sequence, ERD, state, class,
    mindmap, timeline, git graph, sankey, and more. Features code-to-diagram analysis,
    batch rendering, 15+ themes, and syntax validation. Use when users ask to create
    diagrams, visualize architecture, render mermaid files, generate ASCII diagrams,
    document system flows, model databases, draw AWS infrastructure, analyze code
    structure, or anything involving "mermaid", "diagram", "flowchart", "architecture
    diagram", "sequence diagram", "ERD", "C4", "ASCII diagram". Do NOT use for non-Mermaid
    image generation, data plotting with chart libraries, or general documentation
    writing.
- name:
  - modular-decomposition
  description: Runs a sequenced monolith-to-modular pipeline that sizes and inventories
    components, finds shared domain duplication, addresses flattening and hierarchy
    issues, analyzes coupling, then groups components into candidate domain-aligned
    units, with optional embedded DDD strategic analysis for bounded contexts. Use
    when asking how to split a monolith, size components before extraction, find duplicated
    domain logic, clean up module hierarchy, measure coupling between modules, or
    group components into services. Do NOT use for phased extraction roadmaps or prioritization
    without the prior analysis steps (use decomposition-planning-roadmap after this
    pipeline), end-to-end legacy migration strategy writeups (use legacy-migration-planner),
    pure infrastructure capacity sizing, or when you only need DDD without the structural
    pipeline (install domain-analysis standalone).
- name:
  - jira-assistant
  description: "Manage Jira issues via Atlassian MCP \u2014 search, create, update,\
    \ transition status, and handle sprint tasks. Auto-detects workspace configuration.\
    \ Use when user says \"create a Jira ticket\", \"update my sprint\", \"check Jira\
    \ status\", \"transition this issue\", \"search Jira\", or \"move ticket to done\"\
    . Do NOT use for Confluence pages (use confluence-assistant)."
- name:
  - coupling-analysis
  description: Analyzes coupling between modules using the three-dimensional model
    (strength, distance, volatility) from "Balancing Coupling in Software Design".
    Use when asking "are these modules too coupled?", "show me dependencies", "analyze
    integration quality", "which modules should I decouple?", "coupling report", or
    evaluating architectural health. Do NOT use for domain boundary analysis (use
    domain-analysis) or component sizing (use component-identification-sizing).
- name:
  - security-best-practices
  description: Perform language and framework specific security best-practice reviews
    and suggest improvements. Use when the user explicitly requests security best
    practices guidance, a security review or report, or secure-by-default coding help.
    Supports Python, JavaScript/TypeScript, and Go. Do NOT use for general code review,
    debugging, threat modeling (use security-threat-model), or non-security tasks.
- name:
  - gh-fix-ci
  description: Use when a user asks to debug or fix failing GitHub PR checks that
    run in GitHub Actions. Uses `gh` to inspect checks and logs, summarize failure
    context, draft a fix plan, and implement only after explicit approval. Treats
    external providers (for example Buildkite) as out of scope and reports only the
    details URL. Do NOT use for addressing PR review comments (use gh-address-comments)
    or general CI outside GitHub Actions.
- name:
  - seo
  description: Optimize for search engine visibility and ranking. Use when asked to
    "improve SEO", "optimize for search", "fix meta tags", "add structured data",
    "sitemap optimization", or "search engine optimization". Do NOT use for accessibility
    (use web-accessibility), performance (use core-web-vitals), or comprehensive site
    audits covering multiple areas (use web-quality-audit).
- name:
  - legacy-migration-planner
  description: Use when planning legacy system migrations, codebase modernization,
    monolith decomposition, microservices consolidation, cross-language rewrites,
    or framework upgrades. Invoke for strangler fig pattern, incremental migration
    strategy, or refactoring roadmaps. Do NOT use for domain analysis (use domain-analysis),
    component sizing (use component-identification-sizing), or step-by-step decomposition
    plans (use decomposition-planning-roadmap).
- name:
  - gtm-engineering
  description: When the user wants to build GTM automation with code, design workflow
    architectures, use AI agents for GTM tasks, or implement the 'architecture over
    tools' principle. Also use when the user mentions 'GTM engineering,' 'GTM automation,'
    'n8n,' 'Make,' 'Zapier,' 'workflow automation,' 'Clay API,' 'instruction stacks,'
    'AI agents for GTM,' or 'revenue automation.' This skill covers technical GTM
    infrastructure from workflow design through agent orchestration. Do NOT use for
    technical implementation, code review, or software architecture.
- name:
  - create-adr
  description: Creates Architecture Decision Records (ADRs) to document significant
    architectural choices and their rationale for future team members. Use when the
    user says "write an ADR", "document this decision", "record why we chose X", "add
    an architecture decision record", "create an ADR for", or wants to capture the
    reasoning behind a technical choice so the team understands it later. Do NOT use
    when the decision hasn't been made yet (use create-rfc instead), for implementation
    planning (use technical-design-doc-creator), or for general documentation.
- name:
  - react-best-practices
  description: React and Next.js performance optimization guidelines from Vercel Engineering.
    Use when writing, reviewing, or refactoring React/Next.js code to ensure optimal
    performance patterns. Triggers on tasks involving React components, Next.js pages,
    data fetching, bundle optimization, or performance improvements. Do NOT use for
    component API architecture or composition patterns (use react-composition-patterns
    instead).
- name:
  - gtm-metrics
  description: When the user wants to define GTM metrics, build a metrics dashboard,
    measure pipeline efficiency, or track AI product performance. Also use when the
    user mentions 'GTM metrics,' 'revenue latency,' 'pipeline metrics,' 'TTFV,' 'time-to-first-value,'
    'data health,' 'attribution,' 'conversion rate,' 'CAC,' 'LTV,' 'NRR,' 'GTM dashboard,'
    'magic number,' 'pipeline velocity,' or 'funnel metrics.' This skill covers GTM
    measurement from metric selection through dashboard design, including AI-specific
    cost metrics, attribution models, and weekly review cadences. Do NOT use for technical
    implementation, code review, or software architecture.
- name:
  - skill-architect
  description: Expert guide for designing and building high-quality skills from scratch
    through structured conversation. Use when someone wants to create a new skill,
    build a skill, design a skill, or asks for help making Agents do something consistently.
    Also use when someone says "turn this into a skill", "I want to automate this
    workflow", "how do I teach my Agent to do X", or mentions creating SKILL.md files.
    Covers standalone skills and MCP-enhanced workflows. Do NOT use for creating subagents
    (use subagent-creator) or technical design documents (use create-technical-design-doc).
- name:
  - create-task-spec
  description: A skill for creating structured task specifications based on detailed
    analysis of the provided task description. Use this skill to generate comprehensive
    technical specifications that will serve as input for task-master, ensuring that
    all necessary context, relevant files, code snippets, and a clear action plan
    are included to facilitate efficient task implementation.
- name:
  - keycloak-docs-index
  description: 'Keycloak Documentation Index. Use this skill whenever the user asks
    about Keycloak features, configuration, deployment, security, monitoring, or any
    other Keycloak-related topic. This skill provides a structured index of official
    Keycloak documentation with direct links to complete guides, allowing agents to
    quickly navigate and access the full documentation context needed for any Keycloak
    task. Always refer to this index when helping with Keycloak setup, configuration,
    troubleshooting, or best practices - even if the user doesn''t explicitly mention
    "documentation" or "guide".

    '
- name:
  - tailwind-config-conformance
  description: 'Validate and refactor Tailwind CSS classes to conform with project''s
    tailwind.config definitions.

    Use this skill whenever: agents or developers generate Tailwind classes without
    checking the config file;

    you need to enforce consistency with custom theme extensions;

    you want to replace arbitrary or ad-hoc classes with officially configured alternatives;

    you''re reviewing code and need to ensure all utility classes match the tailwind.config
    (colors, spacing, typography, etc.);

    you want to migrate code to use only valid config-defined classes instead of free-form
    utilities.

    Works with React, Vue, HTML, Svelte, and any code containing Tailwind classes.
    Automatically discovers tailwind.config.js/ts

    and validates against both built-in Tailwind defaults and custom extensions defined
    in the config.

    '
- name:
  - typescript-style-guide
  description: 'Conventions and best practices for writing maintainable TypeScript
    code based on the Google TypeScript Style Guide. Use this skill when writing new
    TypeScript modules or services, refactoring TypeScript code to improve readability
    and maintainability, enforcing consistent naming, typing, and formatting conventions,
    designing strongly typed APIs, interfaces, and classes, avoiding unsafe patterns
    such as `any`, prototype modification, or loose equality, structuring large TypeScript
    codebases with predictable patterns, and implementing safe and maintainable code
    in Node.js or browser TypeScript projects. Emphasizes strong typing, clear naming
    conventions, strict equality usage, minimal visibility exposure, avoiding dangerous
    JavaScript features, and consistent formatting. Reference: https://google.github.io/styleguide/tsguide.html'
- name:
  - generate-docs-init
  description: 'Use this skill to generate, refactor, or maintain comprehensive project
    documentation from source code. Triggers include: any request to "document the
    project", "write docs", "create a README", "generate architecture docs", "write
    a contribution guide", "create an ADR", or "document this codebase". Also triggers
    when asked to analyze folder/module structure and produce incremental documentation.
    The skill autonomously walks the workspace tree, breaks it into modules and files,
    and produces a full docs/ hierarchy (SUMMARY, architecture, setup, usage, modules,
    contribution, ADRs, etc.) with Mermaid diagrams, tables, and navigable Markdown
    links. Do NOT use for code generation, debugging, or non-documentation writing
    tasks.

    '
- name:
  - agent-creator
  description: Create new specialist agents, modify and improve existing agents, and
    validate agent behavior. Use when users want to create a custom agent from scratch,
    edit or optimize an existing agent, test an agent against realistic prompts, or
    improve an agent's description and instructions. Triggers on phrases like "create
    an agent for X", "make a specialist agent that does Y", "build me an agent for
    Z", "improve this agent", "update agent instructions", "add a new agent", or whenever
    a new autonomous specialist role needs to be defined. Always use this skill when
    the work involves writing or editing .agent.md files, even if the user just says
    "I need something that specializes in X".
- name:
  - handling-large-files
  description: "Strategies for reading, chunking, and processing files that exceed\
    \ practical token limits. Covers streaming reads, selective extraction, summarization-before-analysis,\
    \ and memory-efficient patterns for large codebases, logs, or datasets. Use whenever\
    \ a file or set of files is too large to fit in context at once. Do NOT use for\
    \ normally-sized files \u2014 adds unnecessary overhead."
- name:
  - generate-docs-update
  description: 'Use this skill to update existing project documentation based on code
    changes. Triggers include: any request to "update the docs", "reflect these changes
    in the documentation", "sync the docs with the latest diff", "update the README
    after this PR", or any situation where a git diff, patch, or modified file is
    provided and documentation needs to be kept in sync. The skill analyzes the diff
    output, identifies which docs/ files are affected, previews every proposed change,
    and only writes after explicit confirmation. Do NOT use for generating documentation
    from scratch (use generate-docs-init instead) or for non-documentation tasks.

    '
- name:
  - codebase-rules-extractor
  description: Extract and document coding rules, patterns, conventions, and anti-patterns
    from a codebase. Maps the code structure, identifies what to do and what to avoid
    when creating new code, and generates a comprehensive rules reference document.
- name:
  - mermaid-erd
  description: "Generate, render, and explain Mermaid Entity Relationship Diagrams\
    \ (ERD) using erDiagram syntax. Use this skill whenever the user wants to model\
    \ database schemas, data models, relational structures, or entity relationships.\
    \ Triggers include: \"ER diagram\", \"ERD\", \"entity relationship\", \"database\
    \ schema\", \"data model\", \"draw my tables\", \"show table relationships\",\
    \ \"model the database\", \"schema diagram\", \"foreign key diagram\", or any\
    \ request to visualize how data entities relate to each other. Also use when a\
    \ user shares SQL DDL, ORM models, or describes tables/entities and wants a diagram.\
    \ Proactively use this skill whenever database design, relational modeling, or\
    \ schema visualization is involved \u2014 even if the user doesn't say \"ERD\"\
    \ or \"Mermaid\".\n"
- name:
  - generate-pr-description
  description: 'A skill for generating structured Pull Request descriptions based
    on git diffs and commit history. It automatically detects and uses .github/pull_request_template.md
    if available, otherwise it uses standard sections like ## Description, ## Task,
    and ## Impact. It also ensures the description is generated in the user''s preferred
    language.'
- name:
  - frontend-patterns
  description: Frontend development patterns for React, Next.js, state management,
    performance optimization, and UI best practices.
- name:
  - taskmaster-overview
  description: AI-driven task management and project tracking using Task Master. Use
    when agent needs to initialize projects, parse Product Requirements Documents
    (PRDs), break down tasks into subtasks, or perform contextual research for technical
    implementations.
- name:
  - taskmaster-mapper
  description: Analyzes task lists (.taskmaster/tasks.json or any task/subtask structure)
    and, for each task and subtask, identifies which skills and agents are most relevant
    based on the task context, then adds them to the `details` section. Use this skill
    whenever the user wants to enrich a task file with skill/agent recommendations,
    wants to know "which agent should handle this task", asks to annotate tasks with
    tooling context, or says things like "add skills and agents to my tasks", "map
    agents to tasks", "which skills apply here", "enrich my task spec with agents",
    or provides a .taskmaster/tasks.json and asks what skills/agents to use. Always
    trigger this skill when the user wants to associate available skills or specialist
    agents with a list of tasks or subtasks, even if they phrase it as "who should
    do this" or "what tool fits each task".
- name:
  - taskmaster-task-validator
  description: Validate taskmaster tasks against requirements and ensure 100% coverage
    of all requisites. Use when you need to verify that created tasks fully address
    all requirements from a PRD or specification. Triggers on phrases like "validate
    my tasks", "check task coverage", "verify tasks against requirements", "validate
    task completeness", "ensure tasks meet requirements", or when assessing whether
    a task structure comprehensively addresses a given specification. This skill will
    analyze requirements in parallel using isolated subagents to validate different
    aspects (requirement coverage, task structure, dependencies, traceability, and
    test adequacy), generate a comprehensive gaps report, and after user approval,
    iteratively update and improve tasks and subtasks until they meet all parameters.
- name:
  - taskmaster-create-task
  description: A skill for creating structured task specifications based on detailed
    analysis of the provided task description. Use this skill to generate comprehensive
    technical specifications that will serve as input for task-master, ensuring that
    all necessary context, relevant files, code snippets, and a clear action plan
    are included to facilitate efficient task implementation.
- name:
  - taskmaster-expand-task
  description: A skill for expanding existing task specifications with additional
    details and context. This skill takes a task specification in markdown format
    and generates an expanded version that includes more comprehensive information,
    examples, and clarifications to help users better understand the task requirements
    and expectations.
- name:
  - taskmaster-prd-generator
  description: "Generate structured Product Requirements Documents (PRDs) for development\
    \ projects in the `.taskmaster/prds/` directory. Use this skill whenever the user:\
    \ says \"create a PRD\", \"write requirements\", \"document this spec\", \"plan\
    \ this project\", or \"help me structure this idea\"; pastes a project description,\
    \ rough notes, or spec file and wants it organized; mentions wanting to run `task-master\
    \ parse-prd`; or describes a feature, app, or system they want to build \u2014\
    \ even casually. Trigger on intent to plan or document a project, not just the\
    \ word \"PRD\". When in doubt, use this skill.\n"
- name:
  - taskmaster-append-tasks
  description: A skill for appending new tasks to an existing task specification in
    task-master. Use this skill to enhance and expand the original task specification
    with additional context, relevant files, code snippets, and a clear action plan
    for efficient task implementation. This skill is designed to ensure that any new
    information or requirements are seamlessly integrated into the existing task specification,
    maintaining a comprehensive and organized structure for task execution.
- name:
  - semantic-commit-message
  description: Generate Conventional Commit messages in English based on staged git
    diffs. Use this skill whenever the user asks for a commit message, semantic/Conventional
    Commits, or wants a commit based on staged changes, even if they just say 'write
    my commit message' or 'help with commit title'.
- name:
  - srs-generator
  description: Generates complete Software Requirements Specification (SRS) documents,
    following the standard template based on ISO/IEC/IEEE 29148:2018. Use this skill
    whenever the user asks to create, write, generate, or document an SRS, software
    requirements specification, requirements document, or mentions terms such as "SRS",
    "software specification", "functional and non-functional requirements", "requirements
    document", or requests to document a software system/product in a structured way.
    Also use it when the user provides information about a system and asks to structure
    it into formal documentation. The skill accepts text descriptions OR spec files,
    asks targeted clarifying questions to fill information gaps, extracts key requirements,
    and lets the user review a preview before saving the file with timestamp format
    at `docs/srs/yyyy-mm-dd-<short-description>.md`
- name:
  - design-image-diff
  description: "Use this skill whenever the user wants to compare a design mockup/wireframe/Figma\
    \ screenshot with a frontend implementation screenshot to identify visual differences\
    \ and generate a list of changes needed. Triggers include: \"compare design with\
    \ implementation\", \"find differences between design and code\", \"what's different\
    \ from the mockup\", \"design review\", \"pixel comparison\", \"why doesn't my\
    \ implementation match the design\", \"QA visual comparison\", \"design vs screenshot\"\
    , or any time two images are provided where one is a design reference and the\
    \ other is a rendered UI. Always use this skill when the user uploads two images\
    \ and asks what needs to change to make one look like the other \u2014 even if\
    \ they don't mention \"design\" explicitly.\n"
- name:
  - database-migrations
  description: Database migration best practices for schema changes, data migrations,
    rollbacks, and zero-downtime deployments across PostgreSQL, MySQL, and common
    ORMs (Prisma, Drizzle, Kysely, Django, TypeORM, golang-migrate).
- name:
  - backend-patterns
  description: Backend architecture patterns, API design, database optimization, and
    server-side best practices for Node.js, Express, and Next.js API routes.
- name:
  - deployment-patterns
  description: Deployment workflows, CI/CD pipeline patterns, Docker containerization,
    health checks, rollback strategies, and production readiness checklists for web
    applications.
- name:
  - docker-patterns
  description: Docker and Docker Compose patterns for local development, container
    security, networking, volume strategies, and multi-service orchestration.
- name:
  - api-design
  description: REST API design patterns including resource naming, status codes, pagination,
    filtering, error responses, versioning, and rate limiting for production APIs.
- name:
  - agent-harness-construction
  description: Design and optimize AI agent action spaces, tool definitions, and observation
    formatting for higher completion rates.
- name:
  - deep-research
  description: Multi-source deep research using firecrawl and exa MCPs. Searches the
    web, synthesizes findings, and delivers cited reports with source attribution.
    Use when the user wants thorough research on any topic with evidence and citations.
- name:
  - cpp-coding-standards
  description: C++ coding standards based on the C++ Core Guidelines (isocpp.github.io).
    Use when writing, reviewing, or refactoring C++ code to enforce modern, safe,
    and idiomatic practices.
- name:
  - data-scraper-agent
  description: "Build a fully automated AI-powered data collection agent for any public\
    \ source \u2014 job boards, prices, news, GitHub, sports, anything. Scrapes on\
    \ a schedule, enriches data with a free LLM (Gemini Flash), stores results in\
    \ Notion/Sheets/Supabase, and learns from user feedback. Runs 100% free on GitHub\
    \ Actions. Use when the user wants to monitor, collect, or track any public data\
    \ automatically."
- name:
  - blueprint
  description: 'Turn a one-line objective into a step-by-step construction plan for
    multi-session, multi-agent engineering projects. Each step has a self-contained
    context brief so a fresh agent can execute it cold. Includes adversarial review
    gate, dependency graph, parallel step detection, anti-pattern catalog, and plan
    mutation protocol. TRIGGER when: user requests a plan, blueprint, or roadmap for
    a complex multi-PR task, or describes work that needs multiple sessions. DO NOT
    TRIGGER when: task is completable in a single PR or fewer than 3 tool calls, or
    user says "just do it".'
- name:
  - regex-vs-llm-structured-text
  description: "Decision framework for choosing between regex and LLM when parsing\
    \ structured text \u2014 start with regex, add LLM only for low-confidence edge\
    \ cases."
- name:
  - coding-standards
  description: Baseline cross-project coding conventions for naming, readability,
    immutability, and code-quality review. Use detailed frontend or backend skills
    for framework-specific patterns.
- name:
  - ai-regression-testing
  description: Regression testing strategies for AI-assisted development. Sandbox-mode
    API testing without database dependencies, automated bug-check workflows, and
    patterns to catch AI blind spots where the same model writes and reviews code.
- name:
  - content-hash-cache-pattern
  description: "Cache expensive file processing results using SHA-256 content hashes\
    \ \u2014 path-independent, auto-invalidating, with service layer separation."
- name:
  - figma-design-system-to-tailwind
  description: Extract and convert a Figma Design System to Tailwind CSS v4 configuration
