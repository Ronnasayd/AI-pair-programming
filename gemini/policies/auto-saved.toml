[[rule]]
toolName = "run_shell_command"
commandRegex = "(cd|ls|pwd|cat|head|tail|find|grep|wc|echo|which|file|env|printenv|mkdir|cp|mv|touch)"
decision = "allow"
priority = 100

[[rule]]
toolName = "run_shell_command"
commandRegex = "git (status|diff|log|show|branch|fetch|pull|merge|tag|ls-files|rev-parse)"
decision = "allow"
priority = 110

[[rule]]
toolName = "run_shell_command"
commandRegex = "git (checkout|switch)"
decision = "allow"
priority = 110

[[rule]]
toolName = "run_shell_command"
commandRegex = "(node|npm|npx|yarn|pnpm|bun)"
decision = "allow"
priority = 100

[[rule]]
toolName = "run_shell_command"
commandRegex = "(python|pip|go)"
decision = "allow"
priority = 100

[[rule]]
toolName = "run_shell_command"
commandRegex = "docker (ps|logs|images)"
decision = "allow"
priority = 120

[[rule]]
toolName = "run_shell_command"
commandRegex = "docker (compose)"
decision = "allow"
priority = 120

[[rule]]
toolName = "run_shell_command"
commandRegex = "(jq|sed|awk|sort|uniq|diff|curl)"
decision = "allow"
priority = 90

[[rule]]
toolName = "run_shell_command"
commandRegex = "(--version|--help)"
decision = "allow"
priority = 80

[[rule]]
toolName = "run_shell_command"
commandRegex = "(rm|rmdir|del)"
decision = "deny"
priority = 900
deny_message = "Deletion commands (rm/rmdir/del) are blocked. Use version control or manual review instead."

[[rule]]
toolName = "run_shell_command"
commandPrefix = "sudo"
decision = "deny"
priority = 950
deny_message = "Privilege escalation via sudo is not allowed."

[[rule]]
toolName = "run_shell_command"
commandPrefix = "chmod"
decision = "deny"
priority = 800
deny_message = "Changing file permissions is not allowed."

[[rule]]
toolName = "run_shell_command"
commandPrefix = "git reset --hard"
decision = "deny"
priority = 950
deny_message = "Hard resets are irreversible and blocked. Use --soft or --mixed instead."

[[rule]]
toolName = "run_shell_command"
commandPrefix = "git clean"
decision = "deny"
priority = 950
deny_message = "git clean permanently removes untracked files and is blocked."

[[rule]]
toolName = "run_shell_command"
commandPrefix = "git push --force"
decision = "deny"
priority = 950
deny_message = "Force pushes are blocked. Use --force-with-lease if absolutely necessary."

[[rule]]
toolName = "run_shell_command"
commandPrefix = "docker rm"
decision = "deny"
priority = 900
deny_message = "Removing Docker containers/images is blocked."

[[rule]]
toolName = "run_shell_command"
commandPrefix = "docker system prune"
decision = "deny"
priority = 950
deny_message = "Docker system prune is irreversible and blocked."

[[rule]]
toolName = "run_shell_command"
commandRegex = "git (commit|push|rebase|branch)"
decision = "ask_user"
priority = 700

[[rule]]
toolName = "run_shell_command"
commandRegex = "docker (run|exec|stop)"
decision = "ask_user"
priority = 700

[[rule]]
decision = "allow"
priority = 950
toolName = "run_shell_command"
commandPrefix = "python3"

[[rule]]
decision = "allow"
priority = 950
toolName = "activate_skill"

[[rule]]
decision = "allow"
priority = 950
mcpName = "exa"
toolName = "mcp_exa_web_search_exa"
